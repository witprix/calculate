<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        body { font-family: sans-serif; padding: 10px; max-width: 800px; margin: auto; }
        
        /* Table Layout for Desktop */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Mobile Responsive Strategy: Stacked Cards */
        @media screen and (max-width: 600px) {
            thead { display: none; } 
            tr { display: block; margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; border-radius: 8px; }
            td { display: block; text-align: right; border: none; padding: 5px 0; }
            td::before { content: attr(data-label); float: left; font-weight: bold; }
            input { width: 60%; }
        }

        .total-row { font-weight: bold; background-color: #f9f9f9; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 4px; color: white; flex: 1; }
        .add-btn { background: #007bff; }
        .whatsapp-btn { background: #25d366; }
    </style>
</head>
<body>

<h2>Expense Tracker</h2>

<table id="productTable">
    <thead>
        <tr>
            <th>Description</th>
            <th>Cost</th>
            <th>Cashback</th>
            <th>Final</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        <tr>
            <td data-label="Description"><input type="text" class="desc" placeholder="Item name"></td>
            <td data-label="Actual Cost"><input type="text" class="cost" value="0" oninput="calculate()"></td>
            <td data-label="Cashback"><input type="text" class="cashback" value="0" oninput="calculate()"></td>
            <td data-label="Final Value" class="final-value">0.00</td>
        </tr>
    </tbody>
    <tfoot>
        <tr class="total-row">
            <td colspan="3" style="text-align: right;">Total:</td>
            <td id="grandTotal">0.00</td>
        </tr>
    </tfoot>
</table>

<div class="btn-group">
    <button class="add-btn" onclick="addRow()">+ Add New Item</button>
    <button class="whatsapp-btn" onclick="copyToWhatsApp()">Copy for WhatsApp</button>
</div>

<script>
    function evaluateMath(str) {
        try {
            if (/^[0-9+\-*/. ]+$/.test(str)) {
                return eval(str);
            }
            return parseFloat(str) || 0;
        } catch (e) { return 0; }
    }

    function calculate() {
        let rows = document.querySelectorAll('#tableBody tr');
        let grandTotal = 0;
        rows.forEach(row => {
            let cost = evaluateMath(row.querySelector('.cost').value);
            let cashback = evaluateMath(row.querySelector('.cashback').value);
            let final = cost - cashback;
            row.querySelector('.final-value').innerText = final.toFixed(2);
            grandTotal += final;
        });
        document.getElementById('grandTotal').innerText = grandTotal.toFixed(2);
    }

    function addRow() {
        let tbody = document.getElementById('tableBody');
        let newRow = `<tr>
            <td data-label="Description"><input type="text" class="desc" placeholder="Item name"></td>
            <td data-label="Actual Cost"><input type="text" class="cost" value="0" oninput="calculate()"></td>
            <td data-label="Cashback"><input type="text" class="cashback" value="0" oninput="calculate()"></td>
            <td data-label="Final Value" class="final-value">0.00</td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', newRow);
    }

    function copyToWhatsApp() {
        let report = "--- Expense Report ---\n```\n";
        let rows = document.querySelectorAll('#tableBody tr');
        
        rows.forEach(row => {
            let desc = (row.querySelector('.desc').value || "Item").padEnd(10);
            let cost = row.querySelector('.cost').value.padEnd(6);
            let cash = row.querySelector('.cashback').value.padEnd(6);
            let final = row.querySelector('.final-value').innerText;
            report += `${desc} | ${cost} | ${cash} | ${final}\n`;
        });
        
        report += "----------------------------\n";
        report += "Total: " + document.getElementById('grandTotal').innerText;
        report += "\n```";

        navigator.clipboard.writeText(report).then(() => {
            alert("Table copied to clipboard! Paste it in WhatsApp.");
        });
    }
</script>

</body>
</html>
