<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expense Tracker Pro</title>
    <style>
        :root { --primary: #4f46e5; --danger: #ef4444; }
        body { font-family: sans-serif; padding: 10px; margin: 0; background: #f4f4f7; }
        
        h2 { text-align: center; font-size: 1.2rem; margin-bottom: 20px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        
        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        #addBtn { background: var(--primary); grid-column: span 2; }
        #exportBtn { background: #6b7280; }
        #importBtn { background: #059669; }
        
        .table-wrap { 
            width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; 
            background: white; border-radius: 8px; padding: 5px; box-sizing: border-box; margin-bottom: 20px;
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; table-layout: fixed; }
        th, td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center; word-wrap: break-word; }
        th { background: #e0e7ff; color: #3730a3; cursor: text; }
        
        input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .del-btn { background: var(--danger); padding: 5px 8px; border-radius: 4px; color: white; border: none; }
    </style>
</head>
<body>

<h2>Expense Tracker</h2>

<div class="btn-group">
    <button id="addBtn">+ Add New Expense</button>
    <button id="exportBtn">Export</button>
    <button id="importBtn">Import</button>
    <input type="file" id="importFile" style="display:none">
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr id="topHeaderRow">
                <th contenteditable="true">Desc</th>
                <th contenteditable="true">Cost</th>
                <th contenteditable="true">Cash</th>
                <th contenteditable="true">Final</th>
                <th>Del</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<h3>Summary Report</h3>
<div class="table-wrap">
    <table id="reportTable">
        <thead id="reportHead"><tr><th>Desc</th><th>Cost</th><th>Cash</th><th>Final</th></tr></thead>
        <tbody id="reportBody"></tbody>
        <tfoot>
            <tr style="font-weight:bold; background:#eee;">
                <td colspan="3" style="text-align:right; padding-right:10px;">TOTAL:</td>
                <td id="reportTotal">0.00</td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
    // Link buttons
    document.getElementById('addBtn').addEventListener('click', () => addRow());
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', importData);

    function updateReportHeaders() {
        const topHeaders = document.querySelectorAll('#topHeaderRow th');
        const reportHeaders = document.querySelector('#reportHead tr');
        // Copy the first 4 headers (skip "Del")
        reportHeaders.innerHTML = `<th>${topHeaders[0].innerText}</th><th>${topHeaders[1].innerText}</th><th>${topHeaders[2].innerText}</th><th>${topHeaders[3].innerText}</th>`;
    }

    function evaluateMath(str) {
        try { return new Function('return ' + str.replace(/[^0-9+\-*/(). ]/g, ''))(); } 
        catch (e) { return 0; }
    }

    function calculate() {
        updateReportHeaders(); // Syncs headers whenever data updates
        let grandTotal = 0;
        let reportHtml = '';
        document.querySelectorAll('#tableBody tr').forEach(row => {
            let cost = evaluateMath(row.querySelector('.cost').value) || 0;
            let cash = evaluateMath(row.querySelector('.cashback').value) || 0;
            let final = cost - cash;
            row.querySelector('.final-value').innerText = final.toFixed(0);
            grandTotal += final;
            reportHtml += `<tr><td>${row.querySelector('.desc').value}</td><td>${cost.toFixed(0)}</td><td>${cash.toFixed(0)}</td><td>${final.toFixed(0)}</td></tr>`;
        });
        document.getElementById('reportBody').innerHTML = reportHtml;
        document.getElementById('reportTotal').innerText = grandTotal.toFixed(0);
    }

    function addRow(data = {desc: '', cost: '0', cash: '0'}) {
        let row = document.createElement('tr');
        row.innerHTML = `
            <td><input type="text" class="desc" value="${data.desc}"></td>
            <td><input type="text" class="cost" value="${data.cost}"></td>
            <td><input type="text" class="cashback" value="${data.cash}"></td>
            <td class="final-value">0</td>
            <td><button class="del-btn">✕</button></td>
        `;
        row.querySelectorAll('input').forEach(i => i.addEventListener('input', calculate));
        row.querySelector('.del-btn').addEventListener('click', (e) => { e.target.closest('tr').remove(); calculate(); });
        document.getElementById('tableBody').appendChild(row);
        calculate();
    }

    function exportData() {
        let data = Array.from(document.querySelectorAll('#tableBody tr')).map(row => ({
            desc: row.querySelector('.desc').value, cost: row.querySelector('.cost').value, cash: row.querySelector('.cashback').value
        }));
        let a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type: "application/json"}));
        a.download = "expenses.json"; a.click();
    }

    function importData(e) {
        let reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('tableBody').innerHTML = '';
            JSON.parse(e.target.result).forEach(item => addRow(item));
        };
        reader.readAsText(e.target.files[0]);
    }

    addRow();
</script>
</body>
</html>
