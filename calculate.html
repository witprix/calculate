<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .total-row { font-weight: bold; background-color: #f9f9f9; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<h2>Product Cost Calculator</h2>

<div class="table-container">
    <table id="productTable">
        <thead>
            <tr>
                <th>Product Description</th>
                <th>Actual Cost</th>
                <th>Cashback</th>
                <th>Final Value</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td><input type="text" placeholder="Item name"></td>
                <td><input type="text" class="cost" value="0" oninput="calculate()"></td>
                <td><input type="text" class="cashback" value="0" oninput="calculate()"></td>
                <td class="final-value">0.00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="3" style="text-align: right;">Total Final Value:</td>
                <td id="grandTotal">0.00</td>
            </tr>
        </tfoot>
    </table>
    <button onclick="addRow()">Add Row</button>
</div>

<script>
    // Helper to safely evaluate math strings like "75+99"
    function evaluateMath(str) {
        try {
            // Regex allows numbers and math operators (+, -, *, /) only
            if (/^[0-9+\-*/. ]+$/.test(str)) {
                return eval(str);
            }
            return parseFloat(str) || 0;
        } catch (e) {
            return 0;
        }
    }

    function calculate() {
        let rows = document.querySelectorAll('#tableBody tr');
        let grandTotal = 0;

        rows.forEach(row => {
            let cost = evaluateMath(row.querySelector('.cost').value);
            let cashback = evaluateMath(row.querySelector('.cashback').value);
            let final = cost - cashback;
            
            row.querySelector('.final-value').innerText = final.toFixed(2);
            grandTotal += final;
        });

        document.getElementById('grandTotal').innerText = grandTotal.toFixed(2);
    }

    function addRow() {
        let tbody = document.getElementById('tableBody');
        let newRow = `<tr>
            <td><input type="text" placeholder="Item name"></td>
            <td><input type="text" class="cost" value="0" oninput="calculate()"></td>
            <td><input type="text" class="cashback" value="0" oninput="calculate()"></td>
            <td class="final-value">0.00</td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', newRow);
    }
</script>

</body>
</html>
