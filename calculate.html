<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        
        /* Input Table Styles */
        table { width: 100%; border-collapse: collapse; margin-bottom: 40px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }

        /* Report Table Styles (The "Excel View") */
        #reportTable { width: 100%; border-collapse: collapse; border: 2px solid #333; margin-top: 20px; }
        #reportTable th { background-color: #d1d1d1; border: 1px solid #333; padding: 10px; text-align: center; }
        #reportTable td { border: 1px solid #999; padding: 8px; text-align: right; }
        #reportTable .desc-cell { text-align: left; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; font-weight: bold; }
    </style>
</head>
<body>

<h2>Expense Tracker</h2>

<div class="btn-group">
    <button onclick="addRow()">+ Add Row</button>
    <button onclick="exportData()" style="background:#6c757d;">Export (JSON)</button>
    <button onclick="document.getElementById('importFile').click()" style="background:#17a2b8;">Import</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
</div>

<table id="productTable">
    <thead>
        <tr><th>Description</th><th>Actual Cost</th><th>Cashback</th><th>Final Value</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<hr>
<h3>Consolidated Report (Screenshot this for WhatsApp)</h3>
<table id="reportTable">
    <thead>
        <tr><th>Description</th><th>Actual Cost</th><th>Cashback</th><th>Final</th></tr>
    </thead>
    <tbody id="reportBody"></tbody>
    <tfoot>
        <tr style="background:#eee; font-weight:bold;">
            <td colspan="3" style="text-align:right;">TOTAL:</td>
            <td id="reportTotal">0.00</td>
        </tr>
    </tfoot>
</table>

<script>
    function evaluateMath(str) {
        try {
            // Remove everything except numbers, operators, and decimal points
            let sanitized = str.replace(/[^0-9+\-*/(). ]/g, '');
            // Evaluate safely
            return new Function('return ' + sanitized)();
        } catch (e) {
            return 0;
        }
    }

    function calculate() {
        let grandTotal = 0;
        let reportHtml = '';
        
        document.querySelectorAll('#tableBody tr').forEach(row => {
            let desc = row.querySelector('.desc').value;
            let costInput = row.querySelector('.cost').value;
            let cashInput = row.querySelector('.cashback').value;
            
            let cost = evaluateMath(costInput) || 0;
            let cash = evaluateMath(cashInput) || 0;
            let final = cost - cash;
            
            row.querySelector('.final-value').innerText = final.toFixed(2);
            grandTotal += final;

            // Populate Report Table
            reportHtml += `<tr>
                <td class="desc-cell">${desc}</td>
                <td>${cost.toFixed(2)}</td>
                <td>${cash.toFixed(2)}</td>
                <td>${final.toFixed(2)}</td>
            </tr>`;
        });
        
        document.getElementById('reportBody').innerHTML = reportHtml;
        document.getElementById('reportTotal').innerText = grandTotal.toFixed(2);
    }

    function addRow(data = {desc: '', cost: '0', cash: '0'}) {
        let row = `<tr>
            <td><input type="text" class="desc" value="${data.desc}" oninput="calculate()"></td>
            <td><input type="text" class="cost" value="${data.cost}" oninput="calculate()"></td>
            <td><input type="text" class="cashback" value="${data.cash}" oninput="calculate()"></td>
            <td class="final-value">0.00</td>
        </tr>`;
        document.getElementById('tableBody').insertAdjacentHTML('beforeend', row);
        calculate();
    }

    function exportData() {
        let name = prompt("Enter filename:", "expenses.json");
        if (!name) return;
        let data = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            data.push({ desc: row.querySelector('.desc').value, cost: row.querySelector('.cost').value, cash: row.querySelector('.cashback').value });
        });
        let blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url; a.download = name.endsWith('.json') ? name : name + '.json';
        a.click();
    }

    function importData(event) {
        let file = event.target.files[0];
        let reader = new FileReader();
        reader.onload = (e) => {
            let data = JSON.parse(e.target.result);
            document.getElementById('tableBody').innerHTML = '';
            data.forEach(item => addRow(item));
        };
        reader.readAsText(file);
    }

    addRow();
</script>
</body>
</html>
