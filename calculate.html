<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This meta tag is crucial for mobile scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expense Tracker Pro</title>
    <style>
        :root { --primary: #4f46e5; --danger: #ef4444; }
        body { font-family: sans-serif; padding: 10px; margin: 0; background: #f4f4f7; }
        
        h2 { text-align: center; font-size: 1.2rem; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        
        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .btn-add { background: var(--primary); grid-column: span 2; }
        .btn-export { background: #6b7280; }
        .btn-import { background: #059669; }
        
        /* Forces the table to stay within screen bounds */
        .table-wrap { overflow-x: auto; background: white; border-radius: 8px; padding: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center; }
        
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-del { background: var(--danger); padding: 5px 8px; border-radius: 4px; }
        
        #reportTable { margin-top: 20px; }
    </style>
</head>
<body>

<h2>Expense Tracker</h2>

<div class="btn-group">
    <button class="btn-add" onclick="addRow()">+ Add New Expense</button>
    <button class="btn-export" onclick="exportData()">Export</button>
    <button class="btn-import" onclick="document.getElementById('importFile').click()">Import</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr><th>Desc</th><th>Cost</th><th>Cash</th><th>Final</th><th>Del</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="table-wrap" style="margin-top:20px;">
    <table>
        <thead><tr><th>Summary</th><th>Cost</th><th>Cash</th><th>Final</th></tr></thead>
        <tbody id="reportBody"></tbody>
        <tfoot>
            <tr style="font-weight:bold; background:#eee;">
                <td colspan="3" style="text-align:right;">TOTAL:</td>
                <td id="reportTotal">0.00</td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
    function evaluateMath(str) {
        try { return new Function('return ' + str.replace(/[^0-9+\-*/(). ]/g, ''))(); } 
        catch (e) { return 0; }
    }

    function calculate() {
        let grandTotal = 0;
        let reportHtml = '';
        document.querySelectorAll('#tableBody tr').forEach(row => {
            let cost = evaluateMath(row.querySelector('.cost').value) || 0;
            let cash = evaluateMath(row.querySelector('.cashback').value) || 0;
            let final = cost - cash;
            row.querySelector('.final-value').innerText = final.toFixed(0);
            grandTotal += final;
            reportHtml += `<tr><td>${row.querySelector('.desc').value.substring(0,8)}</td><td>${cost.toFixed(0)}</td><td>${cash.toFixed(0)}</td><td>${final.toFixed(0)}</td></tr>`;
        });
        document.getElementById('reportBody').innerHTML = reportHtml;
        document.getElementById('reportTotal').innerText = grandTotal.toFixed(0);
    }

    function addRow(data = {desc: '', cost: '0', cash: '0'}) {
        let row = document.createElement('tr');
        row.innerHTML = `
            <td><input type="text" class="desc" style="width:60px" value="${data.desc}" oninput="calculate()"></td>
            <td><input type="text" class="cost" style="width:50px" value="${data.cost}" oninput="calculate()"></td>
            <td><input type="text" class="cashback" style="width:50px" value="${data.cash}" oninput="calculate()"></td>
            <td class="final-value">0</td>
            <td><button class="btn-del" onclick="this.closest('tr').remove(); calculate();">✕</button></td>
        `;
        document.getElementById('tableBody').appendChild(row);
        calculate();
    }

    function exportData() {
        let data = Array.from(document.querySelectorAll('#tableBody tr')).map(row => ({
            desc: row.querySelector('.desc').value, cost: row.querySelector('.cost').value, cash: row.querySelector('.cashback').value
        }));
        let a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type: "application/json"}));
        a.download = "expenses.json"; a.click();
    }

    function importData(event) {
        let reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('tableBody').innerHTML = '';
            JSON.parse(e.target.result).forEach(item => addRow(item));
        };
        reader.readAsText(event.target.files[0]);
    }

    addRow();
</script>
</body>
</html>
