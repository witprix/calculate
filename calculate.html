<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <style>
        body { font-family: sans-serif; padding: 10px; max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Spreadsheet Mode Styling */
        .spreadsheet-mode input { border: none; background: transparent; pointer-events: none; }
        .spreadsheet-mode th { background-color: #f2f2f2; border: 1px solid #aaa; }
        .spreadsheet-mode td { border: 1px solid #aaa; }
        .spreadsheet-mode #controls { display: none !important; }

        @media screen and (max-width: 600px) {
            thead { display: none; } 
            tr { display: block; margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; border-radius: 8px; }
            td { display: block; text-align: right; border: none; padding: 5px 0; }
            td::before { content: attr(data-label); float: left; font-weight: bold; }
            input { width: 60%; }
        }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .add-btn { background: #007bff; }
        .export-btn { background: #28a745; }
        .import-btn { background: #17a2b8; }
        .view-btn { background: #fd7e14; }
    </style>
</head>
<body id="mainBody">

<h2>Expense Tracker</h2>

<table id="productTable">
    <thead>
        <tr><th>Description</th><th>Actual Cost</th><th>Cashback</th><th>Final Value</th></tr>
    </thead>
    <tbody id="tableBody">
        <tr>
            <td data-label="Description"><input type="text" class="desc" placeholder="Item name"></td>
            <td data-label="Actual Cost"><input type="text" class="cost" value="0" oninput="calculate()"></td>
            <td data-label="Cashback"><input type="text" class="cashback" value="0" oninput="calculate()"></td>
            <td data-label="Final Value" class="final-value">0.00</td>
        </tr>
    </tbody>
    <tfoot>
        <tr style="font-weight: bold;">
            <td colspan="3" style="text-align: right;">Total:</td>
            <td id="grandTotal">0.00</td>
        </tr>
    </tfoot>
</table>

<div class="btn-group" id="controls">
    <button class="add-btn" onclick="addRow()">+ Row</button>
    <button class="export-btn" onclick="exportToCSV()">Export (CSV)</button>
    <button class="import-btn" onclick="document.getElementById('importFile').click()">Import</button>
    <button class="view-btn" onclick="toggleSpreadsheetView()">View as Spreadsheet</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
</div>

<script>
    function toggleSpreadsheetView() {
        document.getElementById('mainBody').classList.toggle('spreadsheet-mode');
        if (document.getElementById('mainBody').classList.contains('spreadsheet-mode')) {
            alert("Spreadsheet Mode: Buttons are hidden. Take your screenshot now! Refresh the page to return to edit mode.");
        }
    }

    function evaluateMath(str) { try { return (/^[0-9+\-*/. ]+$/.test(str)) ? eval(str) : parseFloat(str) || 0; } catch(e){ return 0; } }

    function calculate() {
        let grandTotal = 0;
        document.querySelectorAll('#tableBody tr').forEach(row => {
            let cost = evaluateMath(row.querySelector('.cost').value);
            let cashback = evaluateMath(row.querySelector('.cashback').value);
            let final = cost - cashback;
            row.querySelector('.final-value').innerText = final.toFixed(2);
            grandTotal += final;
        });
        document.getElementById('grandTotal').innerText = grandTotal.toFixed(2);
    }

    function addRow(data = {desc: '', cost: '0', cash: '0'}) {
        let row = `<tr>
            <td data-label="Description"><input type="text" class="desc" value="${data.desc}" placeholder="Item name"></td>
            <td data-label="Actual Cost"><input type="text" class="cost" value="${data.cost}" oninput="calculate()"></td>
            <td data-label="Cashback"><input type="text" class="cashback" value="${data.cash}" oninput="calculate()"></td>
            <td data-label="Final Value" class="final-value">0.00</td>
        </tr>`;
        document.getElementById('tableBody').insertAdjacentHTML('beforeend', row);
        calculate();
    }

    function exportToCSV() {
        let name = prompt("Enter filename:", "expenses.csv");
        if (!name) return;
        let csvContent = "Description,Actual Cost,Cashback,Final Value\n";
        document.querySelectorAll('#tableBody tr').forEach(row => {
            csvContent += `"${row.querySelector('.desc').value}","${row.querySelector('.cost').value}","${row.querySelector('.cashback').value}","${row.querySelector('.final-value').innerText}"\n`;
        });
        let blob = new Blob([csvContent], {type: "text/csv"});
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url; a.download = name.endsWith('.csv') ? name : name + '.csv';
        a.click();
    }

    function importData(event) {
        let file = event.target.files[0];
        let reader = new FileReader();
        reader.onload = (e) => {
            let data = JSON.parse(e.target.result);
            document.getElementById('tableBody').innerHTML = '';
            data.forEach(item => addRow(item));
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
